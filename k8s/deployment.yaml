apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-lab-app
  labels:
    app: platform-lab-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-lab-app

  template:
    metadata:
      labels:
        app: platform-lab-app

    spec:
      containers:
        - name: platform-lab-app
          image: platform-lab-app:local
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15