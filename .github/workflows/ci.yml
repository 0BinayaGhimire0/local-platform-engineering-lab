name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-build:
    name: Validate and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r app/requirements.txt
          pip install PyYAML

      - name: Check Python syntax
        run: |
          python -m py_compile app/app.py

      - name: Build Docker image
        run: |
          docker build -t platform-lab-app:ci -f docker/Dockerfile .

      - name: Validate Kubernetes YAML syntax
        run: |
          python - <<'PY'
          import yaml

          files = [
              "k8s/deployment.yaml",
              "k8s/service.yaml",
          ]

          for file in files:
              with open(file) as f:
                  list(yaml.safe_load_all(f))

          print("Kubernetes YAML syntax is valid")
          PY